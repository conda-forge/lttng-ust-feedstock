context:
  name: lttng-ust
  version: "2.15.0"

package:
  name: lttng-ust
  version: ${{ version }}

source:
  - url: http://lttng.org/files/lttng-ust/lttng-ust-${{ version }}.tar.bz2
    sha256: 6bc9723c7a50dd00c7da83d40b3bbb4b0746819f4d6e377c9bd897c898993e28

build:
  skip: not linux
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ cdt('numactl') }}
    - make
    - autoconf
    - pkg-config
  host:
    - liburcu
    - python 3.12.*
  run:
    - liburcu
  ignore_run_exports:
    from_package:
      - python
  run_exports:
    - ${{ pin_subpackage(name, upper_bound="x.x") }}

tests:
  - package_contents:
      include:
        - lttng/tracepoint.h
      lib:
        - lttng-ust

about:
  homepage: https://lttng.org/
  license: LGPL-2.1-only
  license_file: LICENSE
  summary: The LTTng User Space Tracing (LTTng-UST) library allows any C/C++ application to be instrumented for and traced by LTTng.
  documentation: https://lttng.org/docs/v${{ version }}/
  repository: https://github.com/lttng/lttng-ust

extra:
  recipe-maintainers:
    - ZimmerA
    - wolfv
